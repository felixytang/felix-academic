# Site settings

locale                   : "en-US"
title                    : "Felix Deng"
title_separator          : "-"
name                     : &name "Yongfei (Felix) Deng"
description              : &description "Postdoctoral Researcher in Physical Oceanography at North Carolina State University"
url                      : https://felixytang.github.io # The base hostname & protocol for your site
baseurl                  : "/felix-academic" # the subpath of your site
repository               : "felixytang/felix-academic"

# Site Author
author:
  avatar           : "profile.png"
  name             : "Yongfei (Felix) Deng"
  pronouns         : "he/him"
  bio              : "Postdoctoral Researcher in Physical Oceanography"
  location         : "Raleigh, NC, USA"
  employer         : "NC State University"
  email            : "ydeng23@ncsu.edu"
  googlescholar    : "https://scholar.google.com/citations?user=MQitERsAAAAJ&hl=en"
  researchgate     : "https://www.researchgate.net/profile/Yongfei-Deng"
  github           : "felixytang"
  linkedin         : "felix-deng"

# Publication categories - the following is the list of publication categories and their headings
publication_category:
  preparation:
    title: 'Papers in Preparation'
  submitted:
    title: 'Submitted Papers & Preprints'
  manuscripts:
    title: 'Journal Articles'

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  publications:
    output: false
  portfolio:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page
  - scope:
      path: ""
      type: portfolio
    values:
      layout: page

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
